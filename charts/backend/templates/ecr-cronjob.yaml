{{- if .Values.cronjob.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ecr-secret-manager
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ecr-secret-manager-binding
subjects:
- kind: ServiceAccount
  name: default
roleRef:
  kind: Role
  name: ecr-secret-manager
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ecr-token-refresh
spec:
  schedule: {{ .Values.cronjob.schedule | quote }}
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: default
          containers:
          - name: ecr-token-refresh
            image: amazon/aws-cli:latest
            command:
            - /bin/sh
            - -c
            - |-
              echo "Fetching ECR token..."
              TOKEN=$(aws ecr get-login-password --region {{ .Values.cronjob.region }})
              if [ $? -ne 0 ]; then exit 1; fi
              kubectl create secret docker-registry ecr-secret                 --docker-server={{ .Values.cronjob.awsAccountId }}.dkr.ecr.{{ .Values.cronjob.region }}.amazonaws.com                 --docker-username=AWS                 --docker-password="${TOKEN}"                 --dry-run=client -o yaml | kubectl apply -f -
            env:
            - name: AWS_DEFAULT_REGION
              value: {{ .Values.cronjob.region }}
          restartPolicy: OnFailure
{{- end }}
