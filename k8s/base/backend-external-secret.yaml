apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backend-secrets
  namespace: default
  annotations:
    reconcile.external-secrets.io/force-sync: "2026-05-05T19:39"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: backend-secrets
    creationPolicy: Owner
  dataFrom:
  - extract:
      key: bookjjeok/test/backend
