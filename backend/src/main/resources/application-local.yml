spring:
  datasource:
    url: jdbc:h2:mem:devdb;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

ai-server:
  url: http://localhost:8000

management:
  endpoints:
    web:
      exposure:
        include: health, info   # 로컬에서 health만 노출
  endpoint:
    health:
      show-details: always