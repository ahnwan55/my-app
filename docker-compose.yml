services:

  # ── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: library_db
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d library_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (캐시 서버) ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot 백엔드 ────────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/library_db
      - AI_SERVER_URL=http://ai-server:8000
      - REDIS_HOST=redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── FastAPI AI 서버 (SRoBERTa 임베딩) ────────────────────────
  ai-server:
    build: ./ai-server
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./ai-server/models:/app/models

  # ── React 프론트엔드 + Nginx ──────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend

volumes:
  postgres_data: