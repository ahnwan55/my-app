apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai.fullname" . }}
  labels:
    {{- include "ai.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ai.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ai.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 100
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          envFrom:
            - secretRef:
                name: {{ .Values.envFromSecret }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
