spring:
  application:
    name: demo
  datasource:
    url: jdbc:postgresql://localhost:5432/findb
    username: admin
    password: secret
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: fintech-platform-jwt-secret-key-must-be-at-least-32-bytes
  access-expiration: 1800000
  refresh-expiration: 604800000